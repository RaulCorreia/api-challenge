version: '3.9'

services:
  # ── Application ─────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: api
    restart: unless-stopped
    expose:
      - "9000"
    volumes:
      - ./:/api
      - /api/vendor
    environment:
      - APP_ENV=${APP_ENV:-local}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  # ── Nginx ────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-api
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./.docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./:/api
    depends_on:
      - api
    networks:
      - app-network

  # ── Database ─────────────────────────────────
  db:
    image: mysql:8.0
    container_name: db-api
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "true"
      MYSQL_DATABASE: api
    volumes:
      - ./.docker/database:/var/lib/mysql
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ── Redis ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis-api
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  # ── Queue Worker: transactions (high priority) ─
  queue-transactions:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: queue-transactions
    restart: on-failure
    command: php artisan queue:work redis --queue=transactions --tries=3 --backoff=10,30,60 --sleep=3 --timeout=90
    volumes:
      - ./:/api
      - /api/vendor
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  # ── Queue Worker: notifications (low priority) ─
  queue-notifications:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: queue-notifications
    restart: on-failure
    command: php artisan queue:work redis --queue=notifications --tries=5 --backoff=30,60,120 --sleep=5 --timeout=60
    volumes:
      - ./:/api
      - /api/vendor
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  # ── MailHog (dev email catcher) ───────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog-api
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
